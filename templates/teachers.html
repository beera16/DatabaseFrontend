<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Teachers Information</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<header>

    <h1>LGS School Management System</h1>

</header>

<div class="main">

    <nav class="sidebar">
        <a href="/">👨‍🎓 Students</a>
        <a href="/teachers" class="active">👩‍🏫 Teachers</a>
        <a href="/subjects">📚 Subjects</a>
    </nav>

    <div class="container">

        <h2>Teachers Information</h2>

        <table>

            <thead>

                <tr>
                    {% for heading in headings %}
                        <th>{{ heading }}</th>
                    {% endfor %}
                </tr>

            </thead>

            <tbody>

                {% for row in rows %}
                <tr>

                    {% for cell in row %}
                        <td>{{ cell }}</td>
                    {% endfor %}

                </tr>
                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

<footer>
    <p>&copy; 2026 LGS School Management System</p>
    <p>Developed by Abeera Faheem</p>
</footer>

</body>

</html>
